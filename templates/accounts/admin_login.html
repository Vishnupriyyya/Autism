{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/admin_style.css' %}">
    <title>Admin Login | Sparkling Minds</title>
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="logo-area">
            <div class="logo-cloud">☁️</div>
            <h2 class="brand-name">Sparkling Minds</h2>
        </div>

        <h1>Admin Login</h1>

        <form method="post">
            {% csrf_token %}
            <div class="input-container">
                {{ form.username }}
            </div>
            
            <div class="input-container password-icon">
                {{ form.password }}
                <span class="lock-icon">🔒</span>
            </div>

            <button type="submit" class="btn-login">Log In</button>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me?</label>
            </div>
        </form>
    </div>
</div>

</body>
</html>
