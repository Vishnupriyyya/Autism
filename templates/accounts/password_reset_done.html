{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/auth_style.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <header class="auth-header">
        <div class="logo">Sparkling Minds</div>
    </header>

    <main class="auth-container">
        <section class="auth-card">
            <h2>Check Your Email</h2>
            <p>An email has been sent with instructions to reset your password. If you don't see it, check your spam folder.</p>
            <p class="login-hint">Back to <a href="{% url 'accounts:login' %}">login</a>.</p>
        </section>
    </main>
</div>
{% endblock %}
