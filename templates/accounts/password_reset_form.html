
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/auth_style.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <header class="auth-header">
        <div class="logo">Sparkling Minds</div>
    </header>

    <main class="auth-container">
        <section class="auth-card">
            <h2>Reset Your Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    {{ form.email.label_tag }}
                    {{ form.email }}
                </div>
                <button type="submit" class="btn btn-teal">Send reset email</button>
            </form>
            <p class="login-hint">Remembered? <a href="{% url 'accounts:login' %}">Log in</a>.</p>
        </section>
    </main>
</div>
{% endblock %}
