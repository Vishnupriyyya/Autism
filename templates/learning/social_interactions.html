{% extends "base.html" %}
{% load static %}

{% block title %}Social Interactions - Sparkling Minds{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/game.css' %}">
<style>
.social-scene {
    max-width: 600px;
    margin: 20px auto;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 25px;
    padding: 30px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.social-characters {
    display: flex;
    justify-content: space-around;
    margin: 30px 0;
}

.character {
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.character:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.character img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.character-name {
    font-weight: bold;
    color: #2c3e50;
}

.action-buttons {
    text-align: center;
    margin: 30px 0;
}

.action-btn {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 16px;
    margin: 0 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255,107,107,0.4);
}

.action-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,107,107,0.6);
}

.feedback {
    min-height: 100px;
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    padding: 20px;
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

.correct { color: #4CAF50; }
.wrong { color: #f44336; }

.progress-bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 5px;
    margin: 20px 0;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4CAF50, #8BC34A);
    transition: width 0.5s ease;
}
</style>
{% endblock %}

{% block content %}
<div class="social-scene">
    <h1 style="text-align: center; color: white; margin-bottom: 20px;">Social Skills Practice</h1>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div id="scene1" class="social-scene-content">
        <p style="color: white; font-size: 20px; text-align: center; margin-bottom: 30px;">Sara looks sad. What should you do?</p>
        
        <div class="social-characters">
            <div class="character" onclick="checkAnswer('hug', true)">
                <div style="font-size: 40px;">🤗</div>
                <div class="character-name">Give a hug</div>
            </div>
            <div class="character" onclick="checkAnswer('hug', false)">
                <div style="font-size: 40px;">📱</div>
                <div class="character-name">Play on phone</div>
            </div>
        </div>
    </div>

    <div id="feedback" class="feedback" style="display: none;"></div>

    <div class="action-buttons" style="display: none;" id="nextBtn">
        <button class="action-btn" onclick="nextScene()">Next Scene</button>
    </div>
</div>

<script>
let currentScore = 0;
const totalQuestions = 5;

function checkAnswer(correctAnswer, isCorrect) {
    const feedback = document.getElementById('feedback');
    const scene = document.getElementById('scene1');
    const nextBtn = document.getElementById('nextBtn');
    
    feedback.style.display = 'block';
    
    if (isCorrect) {
        feedback.innerHTML = '🎉 Excellent! Giving a hug shows empathy!';
        feedback.className = 'feedback correct';
        currentScore++;
    } else {
        feedback.innerHTML = 'Try again! Think about how Sara feels.';
        feedback.className = 'feedback wrong';
    }
    
    scene.style.opacity = '0.5';
    nextBtn.style.display = 'block';
    
    updateProgress();
}

function updateProgress() {
    const progress = document.getElementById('progress');
    const percent = (currentScore / totalQuestions) * 100;
    progress.style.width = percent + '%';
}

function nextScene() {
    // Load next social scenario (in real app, randomize or sequence)
    alert('Great practice! You scored ' + currentScore + '/1\nSocial skills level up! 🥳');
    // Redirect to completion or next activity
    window.location.href = '{% url "learning:complete_activity" %}';
}
</script>
{% endblock %}
