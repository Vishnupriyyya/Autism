{% extends "base.html" %}

{% block title %}{{ action }} Child Profile{% endblock %}

{% block content %}
<h1>{{ action }} Child Profile</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
</form>
<p><a href="{% url 'children:parent_dashboard' %}">Cancel</a></p>
{% endblock %}
