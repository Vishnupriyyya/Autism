{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/auth_style.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <header class="auth-header">
        <div class="logo">Sparkling Minds</div>
    </header>

    <main class="auth-container">
        <section class="auth-card">
            <h2>Password Reset Complete</h2>
            <p>Your password has been set. You may now <a href="{% url 'accounts:login' %}">log in</a> with your new password.</p>
        </section>
    </main>
</div>
{% endblock %}
