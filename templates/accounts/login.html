

{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/auth_style.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <header class="auth-header">
        <div class="logo">Sparkling Minds</div>
    </header>

    <main class="auth-container">
        <!-- only show login card; registration link placed below the form -->
        <section class="auth-card">
            <h2>Login</h2>
            <form method="post" action="{% url 'accounts:login' %}">
                {% csrf_token %}
                <div class="input-group">
                    {{ form.username.label_tag }}
                    {{ form.username }}
                    {{ form.password.label_tag }}
                    {{ form.password }}
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-teal">Log In</button>
                <a href="{% url 'accounts:password_reset' %}" class="forgot-link">Forgot Password?</a>
            </form>
            <p class="register-hint">Not registered yet? <a href="{% url 'accounts:register' %}">Create an account</a>.</p>
        </section>
    </main>
</div>
{% endblock %}
